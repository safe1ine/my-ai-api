services:
  postgres:
    image: docker.1ms.run/postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_api
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.1ms.run/safe1ine/my-ai-api:latest
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "8"]
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_api
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    restart: unless-stopped

  health-checker:
    image: ghcr.1ms.run/safe1ine/my-ai-api:latest
    command: ["python", "health_checker.py"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_api
    restart: unless-stopped

  nginx:
    image: ghcr.1ms.run/safe1ine/my-ai-api-nginx:latest
    ports:
      - "127.0.0.1:10086:80"
    depends_on:
      - app
    restart: unless-stopped

